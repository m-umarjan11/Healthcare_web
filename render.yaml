services:
  - type: web
    name: vitalis-medical-api
    runtime: python
    plan: starter
    region: oregon
    buildCommand: "pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r 'Medical Chatbot/requirements.txt'"
    startCommand: "cd 'Medical Chatbot' && gunicorn -w 1 --timeout 120 -b 0.0.0.0:$PORT flask_api:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_NAME
        value: llama-3.1-8b-instant
      - key: ALLOWED_ORIGINS
        value: https://healthcare-ui-two.vercel.app
